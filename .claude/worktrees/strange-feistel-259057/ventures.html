<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventures · FrostLabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5efe6;
      --surface: #ffffff;
      --surface2: #f0e3d4;
      --border: #e0d2c2;
      --text: #24130a;
      --text-muted: #8a6a4f;
      --text-dim: #b39a84;
      --accent: #d38b5d;
      --active: #5bb98a;
      --font-serif: 'DM Serif Display', serif;
      --font-sans: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      padding: 48px 64px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .site-title { font-family: var(--font-serif); font-size: 40px; letter-spacing: -1px; line-height: 1; }
    .site-title span { color: var(--accent); }
    .nav {
      display: flex;
      gap: 20px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }
    .nav a:hover {
      color: var(--text);
      border-bottom-color: var(--border);
    }
    .nav a.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    main { max-width: 1200px; margin: 0 auto; padding: 0 64px 72px; }
    .page-intro { padding: 40px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .page-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-dim); margin-bottom: 10px; }
    .page-title { font-family: var(--font-serif); font-size: 36px; margin-bottom: 8px; }
    .page-sub { font-size: 14px; color: var(--text-muted); max-width: 560px; }
    .ventures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 32px; }
    .venture-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-top-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .card-name { font-family: var(--font-serif); font-size: 22px; line-height: 1.2; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: rgba(255,255,255,0.6);
    }
    .tag.status-active { border-color: var(--active); color: var(--active); }
    .tag.status-in-development { border-color: #60a5fa; color: #60a5fa; }
    .tag.status-idea { border-color: var(--accent); color: var(--accent); }
    .tag.status-on-hold { border-color: #f59e0b; color: #f59e0b; }
    .tag.status-completed { border-color: var(--text-muted); color: var(--text-muted); }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-label {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .meta-group { min-width: 120px; }
    .card-summary { font-size: 14px; color: var(--text-muted); }
    .card-footer {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .detail-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
    }
    .detail-link-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .empty-state {
      padding: 40px 0;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }
    @media (max-width: 900px) {
      header { padding: 32px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
      main { padding: 0 24px 56px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 class="site-title">Frost<span>Labs</span></h1>
    </div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/ventures.html" class="active">Ventures</a>
      <a href="/blog.html">Blog</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>
  <main>
    <section class="page-intro">
      <div class="page-eyebrow">Ventures</div>
      <h2 class="page-title">A studio of experiments and companies.</h2>
      <p class="page-sub">A living portfolio of products, experiments, and businesses across FrostLabs – from active companies to ideas in incubation.</p>
    </section>
    <section>
      <div id="ventures-grid" class="ventures-grid">
        <div class="empty-state">Loading ventures...</div>
      </div>
    </section>
  </main>
  <script>
    function statusClass(s) {
      var map = {'Active':'status-active','In Development':'status-in-development','Idea':'status-idea','On Hold':'status-on-hold','Completed':'status-completed'};
      return map[s] || '';
    }
    function fmtDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function renderVentures(ventures) {
      var grid = document.getElementById('ventures-grid');
      if (!ventures.length) {
        grid.innerHTML = '<div class="empty-state">No ventures yet. New experiments coming soon.</div>';
        return;
      }
      grid.innerHTML = ventures.map(function(v) {
        return (
          '<article class="venture-card">' +
            '<div class="card-top-row">' +
              '<div>' +
                '<h3 class="card-name">' + esc(v.name) + '</h3>' +
                '<div class="card-tags">' +
                  (v.status ? '<span class="tag ' + statusClass(v.status) + '">' + esc(v.status) + '</span>' : '') +
                  (v.category ? '<span class="tag">' + esc(v.category) + '</span>' : '') +
                '</div>' +
              '</div>' +
            '</div>' +
            (v.summary ? '<p class="card-summary">' + esc(v.summary) + '</p>' : '') +
            '<div class="meta-row">' +
              (v.dateStarted ? '<div class="meta-group"><div class="meta-label">Founded</div><div>' + fmtDate(v.dateStarted) + '</div></div>' : '') +
              (v.tags && v.tags.length ? '<div class="meta-group"><div class="meta-label">Themes</div><div>' + v.tags.map(function(t){return esc(t);}).join(', ') + '</div></div>' : '') +
            '</div>' +
            '<div class="card-footer">' +
              (v.website ? '<a class="detail-link-btn" href="' + esc(v.website) + '" target="_blank" rel="noopener">Visit site &#8599;</a>' : '<span style="font-size:12px;color:var(--text-dim)">Internal / in development</span>') +
            '</div>' +
          '</article>'
        );
      }).join('');
    }
    fetch('/api/ventures').then(function(r){return r.json();}).then(function(data){
      if (!Array.isArray(data)) data = [];
      renderVentures(data);
    }).catch(function(){
      var grid = document.getElementById('ventures-grid');
      grid.innerHTML = '<div class="empty-state">Could not load ventures right now.</div>';
    });
  </script>
</body>
</html>
