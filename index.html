<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrostLabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5efe6;
      --surface: #ffffff;
      --surface2: #f0e3d4;
      --border: #e0d2c2;
      --text: #24130a;
      --text-muted: #8a6a4f;
      --text-dim: #b39a84;
      --accent: #d38b5d;
      --active: #5bb98a;
      --font-serif: 'DM Serif Display', serif;
      --font-sans: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #main-view { min-height: 100vh; }
    #detail-view {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #detail-view.visible { transform: translateX(0); }
    header {
      padding: 48px 64px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .site-title { font-family: var(--font-serif); font-size: 48px; letter-spacing: -1px; line-height: 1; }
    .site-title span { color: var(--accent); }
    .site-sub { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
    .stat { padding: 28px 64px; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-num { font-family: var(--font-serif); font-size: 42px; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    main { max-width: 1400px; margin: 0 auto; padding: 0 64px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; padding: 56px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .section-title { font-family: var(--font-serif); font-size: 28px; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 16px; font-size: 12px; font-family: var(--font-sans); cursor: pointer; border-radius: 2px; letter-spacing: 0.05em; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--border); color: var(--text-muted); border-radius: 2px; }
    .tag.status-active { border-color: var(--active); color: var(--active); }
    .tag.status-in-development { border-color: #60a5fa; color: #60a5fa; }
    .tag.status-idea { border-color: var(--accent); color: var(--accent); }
    .tag.status-on-hold { border-color: #f59e0b; color: #f59e0b; }
    .tag.status-completed { border-color: var(--text-muted); color: var(--text-muted); }
    .ventures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 80px; }
    .venture-card { background: var(--bg); padding: 28px; cursor: pointer; transition: background 0.15s; position: relative; }
    .venture-card:hover { background: var(--surface); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .arrow-icon { color: var(--text-dim); font-size: 16px; transition: color 0.15s, transform 0.15s; flex-shrink: 0; margin-left: 8px; }
    .venture-card:hover .arrow-icon, .post-card:hover .arrow-icon { color: var(--text); transform: translate(2px,-2px); }
    .card-name { font-family: var(--font-serif); font-size: 20px; margin-bottom: 8px; line-height: 1.2; }
    .card-summary { color: var(--text-muted); font-size: 13px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 80px; }
    .post-card { background: var(--bg); padding: 32px; cursor: pointer; transition: background 0.15s; position: relative; }
    .post-card:hover { background: var(--surface); }
    .post-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .post-category { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
    .post-date, .post-read-time { font-size: 12px; color: var(--text-muted); }
    .post-title { font-family: var(--font-serif); font-size: 22px; margin-bottom: 10px; line-height: 1.3; }
    .post-summary { color: var(--text-muted); font-size: 13px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .post-tags { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
    .empty-state { padding: 64px; text-align: center; color: var(--text-dim); font-size: 13px; background: var(--bg); }
    .skeleton { background: var(--surface2); border-radius: 2px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }
    .detail-nav { padding: 24px 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .back-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 18px; font-size: 12px; font-family: var(--font-sans); cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; border-radius: 2px; }
    .back-btn:hover { border-color: var(--text); color: var(--text); }
    .detail-crumb { font-size: 12px; color: var(--text-dim); }
    .detail-body { max-width: 860px; margin: 0 auto; padding: 64px; }
    .detail-eyebrow { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .detail-title { font-family: var(--font-serif); font-size: 52px; line-height: 1.1; margin-bottom: 24px; letter-spacing: -1px; }
    .detail-meta-row { display: flex; gap: 40px; padding: 24px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 40px; flex-wrap: wrap; }
    .detail-meta-item { display: flex; flex-direction: column; gap: 5px; }
    .detail-meta-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
    .detail-meta-value { font-size: 14px; color: var(--text-muted); }
    .detail-summary { font-size: 18px; line-height: 1.85; color: var(--text-muted); margin-bottom: 48px; }
    .detail-tags-section { margin-bottom: 40px; }
    .detail-tags-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
    .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .detail-tag { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); color: var(--text-muted); border-radius: 2px; }
    .detail-link-btn { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; transition: all 0.15s; text-decoration: none; border-radius: 2px; }
    .detail-link-btn:hover { border-color: var(--text); color: var(--text); }
    .post-content { line-height: 1.9; color: var(--text-muted); }
    .post-content h1 { font-family: var(--font-serif); font-size: 32px; color: var(--text); margin: 48px 0 16px; line-height: 1.2; }
    .post-content h2 { font-family: var(--font-serif); font-size: 26px; color: var(--text); margin: 40px 0 12px; line-height: 1.3; }
    .post-content h3 { font-size: 16px; font-weight: 600; color: var(--text); margin: 32px 0 10px; letter-spacing: 0.02em; }
    .post-content p { margin-bottom: 20px; font-size: 16px; }
    .post-content ul, .post-content ol { margin: 16px 0 20px 28px; }
    .post-content li { margin-bottom: 8px; font-size: 16px; }
    .post-content blockquote { border-left: 3px solid var(--accent); padding: 12px 24px; margin: 28px 0; background: var(--surface); font-style: italic; font-size: 16px; }
    .post-content pre { background: var(--surface2); border: 1px solid var(--border); padding: 20px 24px; border-radius: 4px; overflow-x: auto; margin: 24px 0; font-size: 13px; }
    .post-content code { background: var(--surface2); padding: 2px 6px; border-radius: 2px; font-size: 13px; }
    .post-content pre code { background: none; padding: 0; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 48px 0; }
    .post-content img { max-width: 100%; border-radius: 4px; margin: 24px 0; display: block; }
    .post-content a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .post-content strong { color: var(--text); font-weight: 600; }
    .post-content .callout { background: var(--surface); border: 1px solid var(--border); padding: 16px 20px; border-radius: 4px; margin: 20px 0; font-size: 15px; }
    .content-loading { display: flex; align-items: center; gap: 12px; color: var(--text-dim); padding: 48px 0; font-size: 13px; }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text-muted); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 900px) {
      header, .detail-nav { padding: 32px 24px; }
      main { padding: 0 24px; }
      .stat { padding: 20px 24px; }
      .detail-body { padding: 40px 24px; }
      .detail-title { font-size: 36px; }
      .site-title { font-size: 32px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="main-view">
  <header>
    <div>
      <h1 class="site-title">Frost<span>Labs</span></h1>
    </div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-ventures">—</div><div class="stat-label">Ventures</div></div>
    <div class="stat"><div class="stat-num" id="stat-active">—</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" id="stat-posts">—</div><div class="stat-label">Posts</div></div>
    <div class="stat"><div class="stat-num" id="stat-pipeline">—</div><div class="stat-label">In Pipeline</div></div>
  </div>
  <main>
    <section>
      <div class="section-header">
        <h2 class="section-title">Ventures</h2>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="All" onclick="setFilter('All')">All</button>
          <button class="filter-btn" data-filter="Active" onclick="setFilter('Active')">Active</button>
          <button class="filter-btn" data-filter="In Development" onclick="setFilter('In Development')">In Dev</button>
          <button class="filter-btn" data-filter="Idea" onclick="setFilter('Idea')">Ideas</button>
          <button class="filter-btn" data-filter="On Hold" onclick="setFilter('On Hold')">On Hold</button>
          <button class="filter-btn" data-filter="Completed" onclick="setFilter('Completed')">Completed</button>
        </div>
      </div>
      <div class="ventures-grid" id="ventures-grid">
        <div class="empty-state"><div class="skeleton" style="height:14px;width:140px;margin:0 auto"></div></div>
      </div>
    </section>
    <section>
      <div class="section-header">
        <h2 class="section-title">Writing</h2>
      </div>
      <div class="posts-grid" id="posts-grid">
        <div class="empty-state"><div class="skeleton" style="height:14px;width:140px;margin:0 auto"></div></div>
      </div>
    </section>
  </main>
</div>
<div id="detail-view">
  <div class="detail-nav">
    <button class="back-btn" onclick="goBack()">&#8592; Back</button>
    <span class="detail-crumb" id="detail-crumb"></span>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>
<script>
  var allVentures = [];
  var allPosts = [];
  var currentFilter = 'All';
  var _displayedVentures = [];
  function statusClass(s) {
    var map = {'Active':'status-active','In Development':'status-in-development','Idea':'status-idea','On Hold':'status-on-hold','Completed':'status-completed'};
    return map[s] || '';
  }
  function fmtDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function renderVentures(ventures) {
    var grid = document.getElementById('ventures-grid');
    _displayedVentures = currentFilter === 'All' ? ventures : ventures.filter(function(v){return v.status===currentFilter;});
    if (!_displayedVentures.length) { grid.innerHTML = '<div class="empty-state">No ventures found.</div>'; return; }
    grid.innerHTML = _displayedVentures.map(function(v,i) {
      return '<div class="venture-card" onclick="openVenture('+i+')"><div class="card-top"><div class="card-tags"><span class="tag '+statusClass(v.status)+'">'+esc(v.status||'Unknown')+'</span>'+(v.category?'<span class="tag">'+esc(v.category)+'</span>':'')+'</div><span class="arrow-icon">&#8599;</span></div><h3 class="card-name">'+esc(v.name)+'</h3>'+(v.summary?'<p class="card-summary">'+esc(v.summary)+'</p>':'')+'</div>';
    }).join('');
  }
  function renderPosts(posts) {
    var grid = document.getElementById('posts-grid');
    if (!posts.length) { grid.innerHTML = '<div class="empty-state">No published posts yet.</div>'; return; }
    grid.innerHTML = posts.map(function(p,i) {
      return '<div class="post-card" onclick="openPost('+i+')"><div class="post-meta">'+(p.category?'<span class="post-category">'+esc(p.category)+'</span>':'')+(p.publishedDate?'<span class="post-date">'+fmtDate(p.publishedDate)+'</span>':'')+(p.readTime?'<span class="post-read-time">'+esc(String(p.readTime))+' min read</span>':'')+'</div><div class="card-top"><h3 class="post-title">'+esc(p.title)+'</h3><span class="arrow-icon">&#8599;</span></div>'+(p.summary?'<p class="post-summary">'+esc(p.summary)+'</p>':'')+(p.tags&&p.tags.length?'<div class="post-tags">'+p.tags.map(function(t){return'<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>':'')+'</div>';
    }).join('');
  }
  function updateStats(v,p) {
    document.getElementById('stat-ventures').textContent = v.length;
    document.getElementById('stat-active').textContent = v.filter(function(x){return x.status==='Active';}).length;
    document.getElementById('stat-posts').textContent = p.length;
    document.getElementById('stat-pipeline').textContent = v.filter(function(x){return x.status==='In Development';}).length;
  }
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter===f);});
    renderVentures(allVentures);
  }
  function openVenture(i) {
    var v = _displayedVentures[i]; if (!v) return;
    document.getElementById('detail-crumb').textContent = 'Ventures / '+v.name;
    document.getElementById('detail-body').innerHTML =
      '<div class="detail-eyebrow"><span class="tag '+statusClass(v.status)+'">'+esc(v.status||'Unknown')+'</span>'+(v.category?'<span class="tag">'+esc(v.category)+'</span>':'')+'</div>'+
      '<h1 class="detail-title">'+esc(v.name)+'</h1>'+
      '<div class="detail-meta-row">'+
        '<div class="detail-meta-item"><span class="detail-meta-label">Status</span><span class="detail-meta-value">'+esc(v.status||'—')+'</span></div>'+
        (v.dateStarted?'<div class="detail-meta-item"><span class="detail-meta-label">Founded</span><span class="detail-meta-value">'+fmtDate(v.dateStarted)+'</span></div>':'')+
        (v.category?'<div class="detail-meta-item"><span class="detail-meta-label">Category</span><span class="detail-meta-value">'+esc(v.category)+'</span></div>':'')+
        (v.website?'<div class="detail-meta-item"><span class="detail-meta-label">Website</span><a href="'+esc(v.website)+'" target="_blank" rel="noopener" class="detail-meta-value" style="color:var(--accent);text-decoration:underline;text-underline-offset:3px">'+esc(v.website.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</a></div>':'')+
      '</div>'+
      (v.summary?'<p class="detail-summary">'+esc(v.summary)+'</p>':'')+
      (v.tags&&v.tags.length?'<div class="detail-tags-section"><p class="detail-tags-label">Tags</p><div class="detail-tags">'+v.tags.map(function(t){return'<span class="detail-tag">'+esc(t)+'</span>';}).join('')+'</div></div>':'')+
      (v.website?'<a href="'+esc(v.website)+'" target="_blank" rel="noopener" class="detail-link-btn">Visit Website &#8599;</a>':'');
    openDetail();
  }
  function openPost(i) {
    var p = allPosts[i]; if (!p) return;
    document.getElementById('detail-crumb').textContent = 'Writing / '+p.title;
    document.getElementById('detail-body').innerHTML =
      '<div class="post-meta" style="margin-bottom:20px">'+(p.category?'<span class="post-category">'+esc(p.category)+'</span>':'')+(p.publishedDate?'<span class="post-date">'+fmtDate(p.publishedDate)+'</span>':'')+(p.readTime?'<span class="post-read-time">'+esc(String(p.readTime))+' min read</span>':'')+'</div>'+
      '<h1 class="detail-title" style="font-size:44px;margin-bottom:16px">'+esc(p.title)+'</h1>'+
      (p.summary?'<p class="detail-summary">'+esc(p.summary)+'</p>':'')+
      (p.tags&&p.tags.length?'<div class="detail-tags-section"><div class="detail-tags">'+p.tags.map(function(t){return'<span class="detail-tag">'+esc(t)+'</span>';}).join('')+'</div></div>':'')+
      '<hr style="border:none;border-top:1px solid var(--border);margin:40px 0">'+
      '<div id="post-content-area" class="post-content"><div class="content-loading"><div class="loading-spinner"></div><span>Loading content...</span></div></div>';
    openDetail();
    fetch('/api/post-content?id='+encodeURIComponent(p.id)).then(function(r){return r.json();}).then(function(data){
      var area = document.getElementById('post-content-area');
      if (area) area.innerHTML = data.html || '<p style="color:var(--text-dim)">No content yet.</p>';
    }).catch(function(){
      var area = document.getElementById('post-content-area');
      if (area) area.innerHTML = '<p style="color:var(--text-dim)">Could not load content.</p>';
    });
  }
  function openDetail() {
    var d = document.getElementById('detail-view');
    d.classList.add('visible');
    d.scrollTop = 0;
    document.body.style.overflow = 'hidden';
  }
  function goBack() {
    document.getElementById('detail-view').classList.remove('visible');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown',function(e){if(e.key==='Escape')goBack();});
  function loadData() {
    Promise.allSettled([
      fetch('/api/ventures').then(function(r){return r.json();}),
      fetch('/api/posts').then(function(r){return r.json();})
    ]).then(function(results) {
      var vr = results[0], pr = results[1];
      if (vr.status==='fulfilled'&&Array.isArray(vr.value)) allVentures = vr.value;
      if (pr.status==='fulfilled'&&Array.isArray(pr.value)) allPosts = pr.value;
      renderVentures(allVentures);
      renderPosts(allPosts);
      updateStats(allVentures, allPosts);
    });
  }
  loadData();
</script>
</body>
</html>
