<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111111; --surface-2: #1a1a1a;
      --border: #222222; --border-2: #2e2e2e; --text: #e8e8e8; --text-2: #aaaaaa; --muted: #666666;
      --accent: #e8b84b; --accent-dim: rgba(232,184,75,0.08); --accent-border: rgba(232,184,75,0.2);
      --green: #4ade80; --green-dim: rgba(74,222,128,0.08);
      --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.08);
      --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.08);
      --purple: #c084fc; --purple-dim: rgba(192,132,252,0.08);
      --gray-dim: rgba(150,150,150,0.08);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    header { border-bottom: 1px solid var(--border); padding: 48px 0 40px; }
    .header-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .header-title { font-family: 'DM Serif Display', Georgia, serif; font-size: clamp(32px,5vw,52px); line-height: 1.1; letter-spacing: -0.02em; color: var(--text); }
    .header-title span { color: var(--accent); font-style: italic; }
    .header-sub { font-size: 13px; color: var(--muted); margin-top: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
    .header-live { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat { background: var(--bg); padding: 20px 24px; text-align: center; }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1; color: var(--text); transition: color 0.3s; }
    .stat-num.loading { color: var(--border-2); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    @media (max-width:600px) { .stats-bar { grid-template-columns: repeat(2,1fr); } }
    .section { padding: 48px 0; border-bottom: 1px solid var(--border); }
    .section-header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { background: none; border: 1px solid var(--border-2); color: var(--muted); font-family: 'Inter',sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 100px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; }
    .filter-btn:hover { border-color: var(--text-2); color: var(--text-2); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .ventures-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    @media (max-width:900px) { .ventures-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width:560px) { .ventures-grid { grid-template-columns: 1fr; } }
    .venture-card { background: var(--surface); padding: 24px; text-decoration: none; color: inherit; display: block; transition: background 0.15s; position: relative; overflow: hidden; }
    .venture-card::after { content: '↗'; position: absolute; top: 16px; right: 16px; font-size: 14px; color: var(--border-2); transition: color 0.15s, transform 0.15s; }
    .venture-card:hover { background: var(--surface-2); }
    .venture-card:hover::after { color: var(--accent); transform: translate(2px,-2px); }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .status-badge { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 100px; border: 1px solid; }
    .status-badge.active { color: var(--green); background: var(--green-dim); border-color: rgba(74,222,128,0.2); }
    .status-badge.in-development { color: var(--amber); background: var(--amber-dim); border-color: rgba(251,191,36,0.2); }
    .status-badge.idea { color: var(--blue); background: var(--blue-dim); border-color: rgba(96,165,250,0.2); }
    .status-badge.completed { color: var(--purple); background: var(--purple-dim); border-color: rgba(192,132,252,0.2); }
    .status-badge.on-hold { color: var(--muted); background: var(--gray-dim); border-color: rgba(150,150,150,0.2); }
    .category-tag { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .card-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.3; padding-right: 24px; }
    .card-summary { font-size: 13px; color: var(--text-2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
    .tag { font-size: 10px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 3px; text-transform: lowercase; letter-spacing: 0.02em; }
    .card-date { font-size: 11px; color: var(--muted); margin-top: 14px; letter-spacing: 0.02em; }
    .blog-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    @media (max-width:640px) { .blog-grid { grid-template-columns: 1fr; } }
    .post-card { background: var(--surface); padding: 28px 28px 24px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 10px; transition: background 0.15s; position: relative; }
    .post-card:hover { background: var(--surface-2); }
    .post-card::after { content: '↗'; position: absolute; top: 20px; right: 20px; font-size: 14px; color: var(--border-2); transition: color 0.15s, transform 0.15s; }
    .post-card:hover::after { color: var(--accent); transform: translate(2px,-2px); }
    .post-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .post-category { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); }
    .post-date { font-size: 11px; color: var(--muted); }
    .post-read-time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .post-title { font-family: 'DM Serif Display', serif; font-size: 19px; line-height: 1.3; color: var(--text); padding-right: 24px; }
    .post-summary { font-size: 13px; color: var(--text-2); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 13px; background: var(--surface); border: 1px solid var(--border); grid-column: 1/-1; }
    .skeleton-card { background: var(--surface); padding: 24px; }
    .skeleton-line { height: 12px; background: var(--surface-2); border-radius: 3px; animation: shimmer 1.5s ease-in-out infinite; }
    .skeleton-line + .skeleton-line { margin-top: 10px; }
    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }
    .skeleton-line.long { width: 100%; }
    @keyframes shimmer { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .error-state { padding: 32px; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); color: #f87171; font-size: 13px; border-radius: 4px; }
    footer { padding: 32px 0; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .footer-text { font-size: 12px; color: var(--muted); }
    .notion-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; transition: all 0.15s; }
    .notion-badge:hover { border-color: var(--border-2); color: var(--text-2); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <div>
          <h1 class="header-title">Business <span>Hub</span></h1>
          <p class="header-sub">Live portfolio · Powered by Notion</p>
        </div>
        <div class="header-live"><div class="live-dot"></div>Live from Notion</div>
      </div>
    </div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num loading" id="stat-total">—</div><div class="stat-label">Ventures</div></div>
    <div class="stat"><div class="stat-num loading" id="stat-active">—</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num loading" id="stat-posts">—</div><div class="stat-label">Posts</div></div>
    <div class="stat"><div class="stat-num loading" id="stat-ideas">—</div><div class="stat-label">In Pipeline</div></div>
  </div>
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Ventures</h2>
        <div class="filters" id="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Active">Active</button>
          <button class="filter-btn" data-filter="In Development">In Dev</button>
          <button class="filter-btn" data-filter="Idea">Ideas</button>
          <button class="filter-btn" data-filter="On Hold">On Hold</button>
          <button class="filter-btn" data-filter="Completed">Completed</button>
        </div>
      </div>
      <div class="ventures-grid" id="ventures-grid">
        <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line medium" style="margin-top:16px;height:16px"></div><div class="skeleton-line long" style="margin-top:12px"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div>
        <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line medium" style="margin-top:16px;height:16px"></div><div class="skeleton-line long" style="margin-top:12px"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div>
        <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line medium" style="margin-top:16px;height:16px"></div><div class="skeleton-line long" style="margin-top:12px"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div>
      </div>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Writing</h2>
        <a href="https://www.notion.so/15aa0a3040c840adb51b3c665d506f90" target="_blank" rel="noopener" class="notion-badge">View all in Notion ↗</a>
      </div>
      <div class="blog-grid" id="blog-grid">
        <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line medium" style="margin-top:14px;height:18px"></div><div class="skeleton-line long" style="margin-top:10px"></div><div class="skeleton-line long"></div></div>
        <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line medium" style="margin-top:14px;height:18px"></div><div class="skeleton-line long" style="margin-top:10px"></div><div class="skeleton-line long"></div></div>
      </div>
    </div>
  </section>
  <footer>
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;width:100%">
      <span class="footer-text">Updated live from Notion · <span id="last-updated">—</span></span>
      <a href="https://www.notion.so/32252f1c05e581c08b0ee343431c9145" target="_blank" rel="noopener" class="notion-badge">Open Hub in Notion ↗</a>
    </div>
  </footer>
  <script>
    let allVentures = [], activeFilter = 'all';
    function statusClass(s) {
      return {'Active':'active','In Development':'in-development','Idea':'idea','Completed':'completed','On Hold':'on-hold'}[s] || 'on-hold';
    }
    function formatDate(iso) {
      if (!iso) return null;
      return new Date(iso).toLocaleDateString('en-US',{month:'short',year:'numeric'});
    }
    function renderVentures(ventures) {
      const grid = document.getElementById('ventures-grid');
      if (!ventures.length) { grid.innerHTML = '<div class="empty-state">No ventures found' + (activeFilter !== 'all' ? ' for this filter' : '') + '.</div>'; return; }
      grid.innerHTML = ventures.map(v => '<a class="venture-card" href="' + v.url + '" target="_blank" rel="noopener"><div class="card-meta">' + (v.status ? '<span class="status-badge ' + statusClass(v.status) + '">' + v.status + '</span>' : '') + (v.category ? '<span class="category-tag">' + v.category + '</span>' : '') + '</div><div class="card-name">' + v.name + '</div>' + (v.summary ? '<div class="card-summary">' + v.summary + '</div>' : '') + (v.tags && v.tags.length ? '<div class="card-tags">' + v.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' : '') + (v.dateStarted ? '<div class="card-date">Since ' + formatDate(v.dateStarted) + '</div>' : '') + '</a>').join('');
    }
    function renderPosts(posts) {
      const grid = document.getElementById('blog-grid');
      if (!posts.length) { grid.innerHTML = '<div class="empty-state">No published posts yet.</div>'; return; }
      grid.innerHTML = posts.map(p => '<a class="post-card" href="' + p.url + '" target="_blank" rel="noopener"><div class="post-meta">' + (p.category ? '<span class="post-category">' + p.category + '</span>' : '') + (p.publishedDate ? '<span class="post-date">' + formatDate(p.publishedDate) + '</span>' : '') + (p.readTime ? '<span class="post-read-time">' + p.readTime + '</span>' : '') + '</div><div class="post-title">' + p.title + '</div>' + (p.summary ? '<div class="post-summary">' + p.summary + '</div>' : '') + '</a>').join('');
    }
    function updateStats(ventures, posts) {
      ['stat-total','stat-active','stat-posts','stat-ideas'].forEach(id => document.getElementById(id).classList.remove('loading'));
      document.getElementById('stat-total').textContent = ventures.length;
      document.getElementById('stat-active').textContent = ventures.filter(v => v.status === 'Active').length;
      document.getElementById('stat-posts').textContent = posts.length;
      document.getElementById('stat-ideas').textContent = ventures.filter(v => v.status === 'Idea' || v.status === 'In Development').length;
    }
    document.getElementById('filter-bar').addEventListener('click', e => {
      if (!e.target.matches('.filter-btn')) return;
      activeFilter = e.target.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderVentures(activeFilter === 'all' ? allVentures : allVentures.filter(v => v.status === activeFilter));
    });
    function showError(id, msg) { document.getElementById(id).innerHTML = '<div class="error-state">⚠ ' + msg + '</div>'; }
    async function loadData() {
      const [vRes, pRes] = await Promise.allSettled([fetch('/api/ventures'), fetch('/api/posts')]);
      let ventures = [], posts = [];
      if (vRes.status === 'fulfilled' && vRes.value.ok) { ventures = await vRes.value.json(); allVentures = ventures; renderVentures(ventures); }
      else showError('ventures-grid', 'Could not load ventures. Check your Notion API key in Vercel.');
      if (pRes.status === 'fulfilled' && pRes.value.ok) { posts = await pRes.value.json(); renderPosts(posts); }
      else showError('blog-grid', 'Could not load posts. Check your Notion API key in Vercel.');
      updateStats(ventures, posts);
      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    }
    loadData();
  </script>
</body>
</html>
